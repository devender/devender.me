name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
  # Weekly rebuild so the /reading page picks up newly-finished books from Goodreads
  # even when nothing was pushed. Mondays 12:00 UTC.
  schedule:
    - cron: '0 12 * * 1'
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: withastro/action@v3
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
